# Publishes the APK committed at release/cadence-release.apk to a rolling GitHub Release.
# Build locally: npm run build:apk  →  copies Gradle output to release/cadence-release.apk
# Direct download URL (stable filename):
#   https://github.com/OWNER/REPO/releases/download/continuous/cadence-release.apk
name: Publish APK (main)

on:
  push:
    branches: [main, master]
    paths:
      - 'release/cadence-release.apk'
      - '.github/workflows/build-apk-release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed APK exists
        run: |
          test -f release/cadence-release.apk || (
            echo "::error::Missing release/cadence-release.apk. Run npm run build:apk locally, then commit and push release/cadence-release.apk"
            exit 1
          )
          ls -la release/cadence-release.apk

      - name: Upload to rolling "continuous" release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Cadence — latest APK (main)
          body: |
            APK committed in this repo at `release/cadence-release.apk` (from `${{ github.sha }}`).

            Install: download **cadence-release.apk** and open it on your Android device (you may need to allow installs from unknown sources).

            This is a **debug** build — same output as `npm run build:apk` locally (`assembleDebug`).
          artifacts: release/cadence-release.apk
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
