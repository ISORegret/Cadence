// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

/** Capacitor / Cordova plugins can pull old kotlin-stdlib-jdk7|8 (e.g. 1.6.x) while newer stdlib embeds those APIs — duplicate class at checkDebugDuplicateClasses. */
subprojects { subproject ->
    subproject.configurations.configureEach {
        resolutionStrategy {
            def v = rootProject.ext.kotlinStdlibVersion
            force "org.jetbrains.kotlin:kotlin-stdlib:$v"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$v"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$v"
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
